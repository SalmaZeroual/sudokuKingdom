name: sudoku_kingdom
description: A Sudoku game with RPG elements
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:  
    sdk: flutter
  url_launcher: ^6.2.4
  timeago: ^3.7.1
  confetti: ^0.7.0
  
  # State Management
  provider: ^6.1.1
  audioplayers: ^5.2.1
  
  # HTTP & WebSocket
  http: ^1.1.0
  socket_io_client: ^2.0.3
  
  # Local Storage
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # UI
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  
  # Utils
  intl: 0.20.2
  uuid: ^4.2.1
  flutter_secure_storage: ^9.0.0
  font_awesome_flutter: ^10.12.0
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/